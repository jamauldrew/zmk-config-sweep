     - /zmk-config-sweep/zmk/app/module/include
     - /zmk-config-sweep/zmk/app/module/dts
     - /zmk-config-sweep/zmk/app/include
     - /zmk-config-sweep/zmk/app/dts/common
     - /zmk-config-sweep/zmk/app/dts
     - /zmk-config-sweep/zephyr/include
     - /zmk-config-sweep/zephyr/include/zephyr
     - /zmk-config-sweep/zephyr/dts/common
     - /zmk-config-sweep/zephyr/dts/x86
